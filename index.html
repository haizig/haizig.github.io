<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<title></title>
		<style type="text/css">
			*{
				margin: 0;
				padding: 0;
				list-style: none;
			}
			
			#header{
				width: 100vw;
				height: 5vh;
				background: red;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			#header p{
				color: white;
			}
			#box1{
				width: 100vw;
				height: 19vh;
				
			}
			#imglist img{width: 100vw;height: 19vh;}
			#main{width: 100vw;height: 19vh;position: relative;overflow: hidden;}
			#lilist{position: absolute;right: 0;bottom: 0;}
			#lilist li{float: left;background: #999999;width: 20px;height: 20px;
			border-radius: 50%;text-align: center;margin-left: 3px;cursor: pointer;
			}
			#lilist li:nth-child(1){
				background: yellow;
			}
			#box2{
				width: 100vw;
				height: 20vh;
				display: flex;
				justify-content: center;
			}
			section {
							width: 96px;
							height: 96px;
							-webkit-transform-style: preserve-3d;
							-webkit-animation: 10s xz linear infinite;
							background: url(橙子.png);
						}
						@-webkit-keyframes xz{
							from{-webkit-transform: rotateY(0deg);}
							to{-webkit-transform: rotateY(360deg);}
						}
						section:hover{
							-webkit-animation-play-state: paused;
						}
						section div {
							position: absolute;
							top: 0;
							left: 0;
							width: 100%;
							height: 100%;
						}
						section div img{
							width: 40px;height: 40px;
						}
						section div:nth-child(1) {
							-webkit-transform: translateZ(100px);
						}
						section div:nth-child(2) {
							-webkit-transform: rotateY(60deg) translateZ(120px);
						}
						section div:nth-child(3) {
							-webkit-transform: rotateY(120deg) translateZ(120px);
						}
						section div:nth-child(4) {
							-webkit-transform: rotateY(180deg) translateZ(120px);
						}
						section div:nth-child(5) {
							-webkit-transform: rotateY(240deg) translateZ(120px);
						}
						section div:nth-child(6) {
							-webkit-transform: rotateY(300deg) translateZ(120px);
						}
						#box3{
							width: 100vw;
							height: 30vh;
						}
		</style>
	</head>
	<body>
		<div id="header">
			<p>海哥特效店</p>
			<p>"给自己一个机会"</p>
		</div>
		<div id="box1">
			<div id="main">
				<ul id="imglist">
					<li><img src="zp1.jpg" ></li>
					<li><img src="zp2.jpg" ></li>
					<li><img src="zp3.jpg" ></li>
					<li><img src="zp4.png" ></li>
					<li><img src="zp5.png" ></li>
				</ul>
				<ul id="lilist">
					<li>1</li>
					<li>2</li>
					<li>3</li>
					<li>4</li>
					<li>5</li>
				</ul>
			</div>
		</div>
		<div id="box2">
			<section>
						<div><img src="哈密瓜.png"/></div>
						<div><img src="橙子.png"/></div>
						<div><img src="火龙果.png"/></div>
						<div><img src="芒果.png"/></div>
						<div><img src="草莓.png"/></div>
						<div><img src="西瓜.png"/></div>
			</section>
		</div>
		<div id="box3">
			<a href="index1.html"><button type="button">除夕倒计时</button></a>
			<a href="index2.html"><button type="button">看烟花</button></a>
		</div>
	</body>
	<script type="text/javascript">
		var main=document.getElementById("main");
				var imglsls=document.getElementById("imglist").getElementsByTagName('li');
				var icons=document.getElementById("lilist").getElementsByTagName('li');
				var m=0;
				var timer=setInterval(run,2000);
				function run () {
					if(m>=5){
						m=0;
					}
					imgrun(m);
					lirun(m);
					m++;
				}
				function imgrun (n) {
					for(var i=0;i<imglsls.length;i++){
						imglsls[i].style.display='none'
					}
					imglsls[n].style.display='block'
				}
				function lirun (n) {
					for(var i=0;i<icons.length;i++){
						icons[i].style.background="#999999"
					}
					icons[n].style.background="yellow"
				}
				main.onmouseover=function  () {
					clearInterval(timer);
				}
				main.onmouseout=function  () {
					timer=setInterval(run,1000);
				}
				for(var i=0;i<icons.length;i++){
					(function(i){
						icons[i].onmouseover=function  () {
						imgrun(i);
						lirun(i);
						m=i+1;
					}
					})(i)
				}
	</script>
</html>

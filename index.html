<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,user-scalable=no" />
		<title>海哥特效店</title>
		<style type="text/css">
			*{
				margin: 0;
				padding: 0;
				list-style: none;
				text-decoration: none;
				color: black;
			}
			#header{
				width: 100vw;
				height: 5vh;
				background: red;
				display: flex;
				justify-content: space-between;
				align-items: center;
			}
			#header p{
				color: white;
			}
			#box1{
				width: 100vw;
				height: 19vh;
			}
			
			#box2{
				width: 100vw;
				height: 20vh;
				display: flex;
				justify-content: center;
			}
			section {
							width: 96px;
							height: 96px;
							-webkit-transform-style: preserve-3d;
							-webkit-animation: 10s xz linear infinite;
							background: url(橙子.png);
						}
						@-webkit-keyframes xz{
							from{-webkit-transform: rotateY(0deg);}
							to{-webkit-transform: rotateY(360deg);}
						}
						section div {
							position: absolute;
							top: 0;
							left: 0;
							width: 100%;
							height: 100%;
						}
						section div img{
							width: 96px;height: 96px;
						}
						section div:nth-child(1) {
							-webkit-transform: translateZ(100px);
						}
						section div:nth-child(2) {
							-webkit-transform: rotateY(60deg) translateZ(120px);
						}
						section div:nth-child(3) {
							-webkit-transform: rotateY(120deg) translateZ(120px);
						}
						section div:nth-child(4) {
							-webkit-transform: rotateY(180deg) translateZ(120px);
						}
						section div:nth-child(5) {
							-webkit-transform: rotateY(240deg) translateZ(120px);
						}
						section div:nth-child(6) {
							-webkit-transform: rotateY(300deg) translateZ(120px);
						}
						#box3{
							width: 100vw;
							height: 20vh;
						}
						#box3-box{
							width: 100vw;
							height: 10vh;
							display: flex;
							justify-content: space-around;
						}
						.box3-nav{
							width: 40px;
							height: 40px;
							background: red;
							text-align: center;
							line-height: 40px;
						}
						#dian2,#dian3{
							display: none;
						}
						#dian2,#dian3 p{
							color: goldenrod;
							font-size: 20px;
						}
						#box4{
							width: 100vw;
							height: 20vh;
						}
						#box4-box{
							width: 40px;
							height: 40px;
							background: yellowgreen;
							animation: 4s yd linear infinite;
						}
						@keyframes yd{
							0%{margin-left: 0;}
							50%{margin-left: 200px;}
						}
						#box5{
							width: 100vw;
							height: 6vh;
							background: gray;
							position: absolute;
							bottom: 0;
							
						}
						#box5-bottom{
							width: 100vw;
							height: 6vh;
						}
						#box5-bottom ul{
							width: 100vw;
							height: 6vh;
							display: flex;
							justify-content: space-around;
							align-items: center;
						}
						
						.zhushi{
							font-size: 10px;
							bottom: 10%;
							right: 0;
							position: absolute;
						}
		</style>
	</head>
	<body>
		<div id="header">
			<p>海哥特效店</p>
			<p>"给自己一个机会"</p>
		</div>
		<div id="box1">
			
		</div>
		<div id="box2">
			<section>
						<div><img src="哈密瓜.png"/></div>
						<div><img src="橙子.png"/></div>
						<div><img src="火龙果.png"/></div>
						<div><img src="芒果.png"/></div>
						<div><img src="草莓.png"/></div>
						<div><img src="西瓜.png"/></div>
			</section>
		</div>
		<div id="box3">
			<div id="box3-box">
				<div class="box3-nav">1</div>
				<div class="box3-nav">2</div>
				<div class="box3-nav">3</div>
			</div>
			<div id="dian1">
				<a href="海子时钟.html"><button type="button">除夕倒计时</button></a>
				<a href="烟花.html"><button type="button">看烟花</button></a>
				<a href="聊天练习.html"><button type="button">聊天系统</button></a>
			</div>
			<div id="dian2">
				<p>等待开发</p>
			</div>
			<div id="dian3">
				<p>等待开发</p>
			</div>
		</div>
		<div id="box4">
			<div id="box4-box">
				
			</div>
		</div>
		<div id="box5">
			<div id="box5-bottom">
				<ul>
					<a href=""><li>首页</li></a>
					<a href="充值.html"><li>充值</li></a>
					<a href=""><li>活动</li></a>
					<a href=""><li>我的</li></a>
				</ul>
			</div>
		</div>
		<p class="zhushi">本网站不支持pc端——因为作者太菜了</br>会慢慢更新，有想法就写</p>
	</body>
	<script type="text/javascript">
		
				var box3nav=document.getElementsByClassName('box3-nav');
				var dian1=document.getElementById("dian1");
				var dian2=document.getElementById("dian2");
				var dian3=document.getElementById("dian3");
				box3nav[0].addEventListener('click',dian1a);
				box3nav[1].addEventListener('click',dian2a);
				box3nav[2].addEventListener('click',dian3a);
				function dian1a(){
					dian1.style.display='block'
					dian2.style.display='none'
					dian3.style.display='none'
				}
				function dian2a(){
					dian1.style.display='none'
					dian2.style.display='block'
					dian3.style.display='none'
				}
				function dian3a(){
					dian1.style.display='none'
					dian2.style.display='none'
					dian3.style.display='block'
				}
				
				
	</script>
</html>
